services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: assay
      POSTGRES_PASSWORD: assay
      POSTGRES_DB: assay
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assay"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      ASSAY_DATABASE_URL: postgresql+asyncpg://assay:assay@db:5432/assay
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./static:/app/static

volumes:
  pgdata:
